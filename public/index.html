<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAlert · Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --bg-2: #111820;
    --panel: #151d26;
    --line: #1f2a36;
    --text: #e6edf3;
    --muted: #7a8a99;
    --accent: #ff4d4d;
    --accent-2: #00d9a5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    position: relative;
  }
  /* Grid de fondo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 20% 30%, rgba(255,77,77,0.08), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,217,165,0.06), transparent 50%);
    pointer-events: none;
  }
  .shell {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 2rem;
  }
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 3rem;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 20px; height: 20px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 20px; height: 20px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .brand-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,77,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(255,77,77,0); }
  }
  .brand-name {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 2.5rem;
    font-weight: 900;
    line-height: 1;
    margin: 1rem 0 0.5rem;
    letter-spacing: -0.02em;
  }
  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2.5rem;
    line-height: 1.5;
  }
  .field {
    margin-bottom: 1.25rem;
  }
  .field label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .field input {
    width: 100%;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 0.9rem 1rem;
    font-family: inherit;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: var(--accent);
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: 0;
    padding: 1rem;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 1rem;
    transition: background 0.2s;
  }
  button:hover:not(:disabled) { background: #ff6666; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(255,77,77,0.1);
    border-left: 3px solid var(--accent);
    color: var(--accent);
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    display: none;
  }
  .error.show { display: block; }
  .hint {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--line);
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.8;
  }
  .hint code {
    color: var(--accent-2);
    background: var(--bg-2);
    padding: 2px 6px;
  }
</style>
</head>
<body>
<div class="shell">
  <form class="card" id="loginForm">
    <div class="brand">
      <div class="brand-dot"></div>
      <div class="brand-name">MedAlert · v1.0</div>
    </div>
    <h1>Acceso <em>seguro</em></h1>
    <p class="subtitle">Sistema de gestión de alertas médicas en tiempo real.</p>

    <div class="error" id="err"></div>

    <div class="field">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>

    <button type="submit" id="btn">Iniciar sesión →</button>

    <div class="hint">
      Usuarios de prueba:<br>
      <code>admin / admin123</code><br>
      <code>medico / medico123</code><br>
      <code>enfermeria / enfermeria123</code>
    </div>
  </form>
</div>

<script>
  const form = document.getElementById('loginForm');
  const err = document.getElementById('err');
  const btn = document.getElementById('btn');

  // Si ya está autenticado, saltar al dashboard
  fetch('/api/me').then(r => { if (r.ok) location.href = '/dashboard.html'; });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          username: form.username.value.trim(),
          password: form.password.value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error');
      location.href = '/dashboard.html';
    } catch (e) {
      err.textContent = '⚠ ' + e.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión →';
    }
  });
</script>
</body>
</html>
